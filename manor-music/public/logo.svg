<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0E1116"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38B6A6"/>
      <stop offset="100%" stop-color="#2A8C80"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Bowling pin silhouette suggesting the venue, tilted like a guitar headstock -->
  <g transform="translate(256 270) rotate(-15)">
    <path d="M 0 -150 C 30 -150 38 -120 38 -90 C 38 -70 28 -56 22 -42
             C 18 -28 30 -10 40 12 C 56 48 56 90 32 120 C 18 138 -18 138 -32 120
             C -56 90 -56 48 -40 12 C -30 -10 -18 -28 -22 -42
             C -28 -56 -38 -70 -38 -90 C -38 -120 -30 -150 0 -150 Z"
          fill="url(#teal)" opacity="0.18"/>
  </g>

  <!-- "ML" monogram in teal -->
  <g fill="#38B6A6" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" text-anchor="middle">
    <text x="256" y="270" font-size="190" letter-spacing="-8">ML</text>
  </g>

  <!-- Teal underline accent -->
  <rect x="156" y="320" width="200" height="10" rx="5" fill="#38B6A6"/>

  <!-- "MANOR LANES" wordmark -->
  <text x="256" y="380" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="700" font-size="38" fill="#F2E9D8" text-anchor="middle"
        letter-spacing="6">MANOR LANES</text>
  <text x="256" y="418" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500" font-size="22" fill="#E0B341" text-anchor="middle"
        letter-spacing="8" opacity="0.85">JUKEBOX</text>
</svg>
